services:
  db:
     image: pgvector/pgvector:pg16
     restart: unless-stopped
     environment:
        POSTGRES_USER: wakaba
        POSTGRES_PASSWORD: wakaba-dev
        POSTGRES_DB: wakaba
     ports:
        - "5433:5432"
     volumes:
        - wakaba_pgdata:/var/lib/postgresql/data

volumes:
   wakaba_pgdata:
